name: Release

on:
  push:
    branches: ["main", "beta"]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-22.04
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta') && vars.RELEASE_ENABLED == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.CI_GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Install release tooling
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Restore .NET
        run: dotnet restore

      - name: InspectCode gate
        run: |
          dotnet tool install -g JetBrains.ReSharper.GlobalTools
          jb inspectcode Kiln.slnx -e=WARNING -f=Text -o=inspect.txt
          if grep -qE '\.cs:[0-9]+' inspect.txt; then
            echo "::error::InspectCode found issues — release blocked"
            grep -E '\.cs:[0-9]+' inspect.txt
            exit 1
          fi
          echo "InspectCode clean — no findings"

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.CI_GITHUB_TOKEN }}
          NUGET_TOKEN: ${{ secrets.NUGET_TOKEN }}
        run: npx semantic-release