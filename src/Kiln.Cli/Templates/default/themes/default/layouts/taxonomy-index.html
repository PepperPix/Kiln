<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ taxonomy.name }} &mdash; {{ site.title }}</title>
    {{ include 'head' }}
    {{ slot 'head' }}
</head>
<body>
    {{ slot 'body_start' }}
    {{ include 'header' }}
    <main>
        {{ slot 'before_content' }}
        <h1>All {{ taxonomy.name }}</h1>
        <div class="tag-cloud">
            {{ for term in taxonomy.terms }}
            <a href="{{ term.url }}" class="tag">{{ term.name }} <span class="tag-count">{{ term.count }}</span></a>
            {{ end }}
        </div>
        {{ slot 'after_content' }}
    </main>
    {{ include 'footer' }}
    {{ slot 'body_end' }}
</body>
</html>
